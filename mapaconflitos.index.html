<style>
:root{--bg:#0a0906;--surface:#141210;--surface2:#1a1814;--border:#2e2a22;--gold:#c9a84c;--gold-light:#e8c97a;--cream:#f0e8d8;--muted:#8a7f6e;--text:#d8cfc0;--text-sm:#b0a898}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{height:100vh;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;font-weight:300;color:var(--text);background:var(--bg);overflow:hidden}
.header{flex-shrink:0;padding:11px 22px 9px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-left .tag{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase}
.header-left h1{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--cream);margin-top:1px}
.filters{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.filter-label{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-right:2px}
.era-btn{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.era-btn.active{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}
.main{flex:1;display:flex;min-height:0}
#map{flex:1;background:#0d1520!important}
.leaflet-container{background:#0d1520!important}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--gold)!important;border-color:var(--border)!important;font-family:'IBM Plex Mono',monospace!important}
.leaflet-control-attribution{display:none!important}
.sidebar{width:248px;flex-shrink:0;background:var(--surface2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:9px 14px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);flex-shrink:0}
.sidebar-count{font-size:9px;color:var(--muted);float:right;letter-spacing:0;font-family:'IBM Plex Mono',monospace}
.sidebar-list{overflow-y:auto;flex:1}
.si{padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;align-items:flex-start;gap:8px}
.si:hover{background:rgba(201,168,76,.05)}
.si.hidden{display:none}
.si-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.si-name{font-size:11.5px;color:var(--cream);font-weight:500;line-height:1.3}
.si-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px}
.overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.popup{background:var(--surface);border:1px solid var(--border);border-radius:3px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 40px 100px rgba(0,0,0,.8);animation:popIn .18s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.popup-close{position:absolute;top:13px;right:14px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:17px;line-height:1;z-index:2;transition:color .15s}
.popup-close:hover{color:var(--cream)}
.popup-top{padding:18px 44px 14px 20px;border-bottom:1px solid var(--border)}
.p-tag{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:2px 7px;border-radius:2px;display:inline-block;margin-bottom:9px}
.p-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--cream);line-height:1.2;margin-bottom:5px}
.p-meta{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
.p-meta span{color:var(--gold-light)}
.popup-grid{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pbox{border:1px solid var(--border);border-radius:2px;padding:11px 13px;background:rgba(255,255,255,.015)}
.pbox.full{grid-column:1/-1}
.pbox h3{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.pbox p{font-size:12px;line-height:1.65;color:var(--text)}
.gov-box{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.18);border-radius:2px;padding:8px 11px}
.gov-box .glabel{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.gov-box p{font-size:11.5px;color:var(--gold-light)}
.cacd-tooltip{background:#1a1814!important;border:1px solid #2e2a22!important;color:#f0e8d8!important;font-family:'IBM Plex Sans',sans-serif!important;border-radius:2px!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important;padding:7px 12px!important;font-size:14px!important}
.cacd-tooltip b{font-size:15px!important}
.cacd-tooltip span{font-size:13px!important;opacity:.75}
.cacd-tooltip::before{display:none!important}
@media(max-width:700px){.sidebar{display:none}.popup-grid{grid-template-columns:1fr}.pbox.full{grid-column:1}}
</style>
</head>

<script>
const C={cabanagem:{title:"Cabanagem",era:"imperio",eraLabel:"Período Imperial",date:"1835–1840",loc:"Grão-Pará (PA e AM)",latlng:[-3.5,-52.5],lideres:"Eduardo Angelim; Francisco Pedro Vinagre; Félix Clemente Malcher",gov:"Regência do Império (Araújo Lima, 1838). D. Pedro II era menor de idade.",reiv:"Revolta de indígenas, caboclos e negros contra a elite branca pós-Independência. Reação à miséria extrema, à exploração do trabalho e à exclusão política. Buscavam autonomia local e melhores condições de vida.",conseq:"30.000–40.000 mortos — cerca de 30–40% da população provincial. Devastação econômica total. Uma das maiores catástrofes demográficas da história brasileira. Derrota militar completa em 1840.",legado:"Símbolo máximo da resistência indígena e popular amazônica. Referência central da historiografia pós-colonial. Memória viva na identidade cultural paraense.",pext:"Evidenciou a fragilidade do controle imperial sobre a Amazônia — região cobiçada por potências europeias e pelos EUA. Instabilidade regional preocupava Portugal e Inglaterra, credores do Império."},balaiada:{title:"Balaiada",era:"imperio",eraLabel:"Período Imperial",date:"1838–1841",loc:"Maranhão",latlng:[-5.4,-45.4],lideres:"Manuel Francisco dos Anjos Ferreira ('Balaio'); Raimundo Gomes; Cosme Bento das Chagas (líder quilombola)",gov:"Regência do Império. Caxias nomeado presidente e comandante militar do Maranhão para suprimir a revolta.",reiv:"Revolta de pobres livres, escravos fugidos e indígenas contra a oligarquia local. Oposição ao recrutamento forçado, à escravidão e à exploração dos fazendeiros. Caráter popular e anti-oligárquico.",conseq:"Derrota militar (1841). Pacificação violenta por Caxias. Morte de Cosme e dos líderes. Consolidou o prestígio de Caxias como 'Pacificador do Império'. Maranhão permanece entre as províncias mais pobres.",legado:"Revelou profundas contradições sociais do Império. Marco na trajetória de Caxias. Objeto de estudo sobre raça, classe e resistência no Brasil oitocentista.",pext:"Reforçou a percepção externa de instabilidade do Império. A Inglaterra, pressionando pelo fim da escravidão, monitorava revoltas com participação de escravos e quilombolas."},males:{title:"Revolta dos Malês",era:"imperio",eraLabel:"Período Imperial",date:"24–25 jan 1835",loc:"Salvador, Bahia",latlng:[-12.97,-38.5],lideres:"Luís Sanim ('Pacífico Licutan'); Manoel Calafate; Aprígio — africanos islâmicos letrados em árabe",gov:"Regência do Império. Presidência provincial da Bahia: Francisco de Souza Martins.",reiv:"Revolta de escravizados e libertos muçulmanos africanos (hauçás e iorubás) em Salvador. Planejavam tomar a cidade, libertar os escravizados e criar um Estado islâmico. Maior revolta urbana de escravizados das Américas.",conseq:"Derrota em menos de 24 horas — delatados por informantes. Cerca de 70 mortos. Líderes executados ou deportados para a África. Endurecimento drástico das leis sobre escravizados. Proibição de manifestações islâmicas.",legado:"A mais sofisticada revolta escrava das Américas: os malês eram letrados em árabe, organizaram a revolta por escrito. João José Reis ('Rebelião Escrava no Brasil', 1986) é a referência fundamental. Símbolo da resistência negra e islâmica.",pext:"Revelou ao mundo a fragilidade do escravismo brasileiro. Diplomatas ingleses usaram o episódio como argumento pelo fim da escravidão. O Brasil acelerou a repressão ao tráfico também por pressão interna pós-Malês."},sabinada:{title:"Sabinada",era:"imperio",eraLabel:"Período Imperial",date:"1837–1838",loc:"Salvador, Bahia",latlng:[-13.5,-39.5],lideres:"Francisco Sabino Álvares da Rocha Vieira ('Sabino') — médico e jornalista liberal",gov:"Regência do Império (Araújo Lima).",reiv:"Proclamação da República Bahiense enquanto D. Pedro II fosse menor de idade. Influência do liberalismo e do federalismo. Reação ao centralismo regencial e à nomeação de presidentes de fora da Bahia.",conseq:"Sufocada militarmente em março de 1838. Sabino preso e deportado. Cerca de 1.000 mortos. Reforçou a política centralizadora do Império.",legado:"Demonstrou a força do liberalismo entre elites provinciais. Precursora de debates sobre autonomia regional que reapareceriam na República e no século XX.",pext:"Preocupou diplomatas europeus. A Bahia era o maior porto do Brasil — sua instabilidade afetava diretamente os interesses comerciais britânicos e portugueses."},farroupilha:{title:"Revolução Farroupilha",era:"imperio",eraLabel:"Período Imperial",date:"1835–1845 (10 anos)",loc:"Rio Grande do Sul (e SC)",latlng:[-30,-53.2],lideres:"Bento Gonçalves da Silva; David Canabarro; Giuseppe Garibaldi; Anita Garibaldi",gov:"Regência do Império e início do 2º Reinado (D. Pedro II). Pacificação negociada por Caxias (1845).",reiv:"Revolta dos estancieiros gaúchos contra impostos imperiais sobre o charque, que prejudicavam a competitividade frente ao charque platino. Reivindicações de autonomia, federalismo e, depois, separatismo: República Rio-Grandense e República Juliana (SC).",conseq:"Acordo de Poncho Verde (1845): anistia geral, integração dos oficiais ao Exército imperial, libertação dos escravos combatentes. A guerra mais longa da história brasileira (10 anos). Garibaldi levou a experiência para unificar a Itália.",legado:"Mito fundador da identidade gaúcha. Garibaldi e Anita tornaram-se ícones da história italiana e gaúcha simultaneamente. 20 de setembro é feriado estadual no RS.",pext:"Envolvimento de Garibaldi conectou o conflito à história europeia. Argentina de Rosas monitorava atentamente — risco de apoio externo aos separatistas. Primeiro conflito brasileiro com repercussão europeia significativa."},praieira:{title:"Revolução Praieira",era:"imperio",eraLabel:"Período Imperial",date:"1848–1850",loc:"Pernambuco (Recife)",latlng:[-8.81,-35.5],lideres:"Pedro Ivo Veloso da Silveira; Nunes Machado; Borges da Fonseca",gov:"2º Reinado — D. Pedro II. Gabinete conservador.",reiv:"Movimento liberal e federalista contra a oligarquia conservadora pernambucana (família Cavalcanti). Influência do socialismo utópico europeu e das revoluções de 1848. Reivindicava liberdade de imprensa, voto universal, fim do poder moderador.",conseq:"Derrota militar em 1850. Líderes presos ou exilados. Última grande revolta do período imperial. Nunes Machado tornou-se mártir do liberalismo pernambucano.",legado:"A revolta com maior conteúdo ideológico do Império — influências socialistas avançadas para a época. Precursora do pensamento republicano e abolicionista.",pext:"Ocorreu no contexto das Revoluções de 1848 na Europa. O governo imperial reforçou relações com monarquias conservadoras europeias para conter o liberalismo revolucionário."},cabanadas:{title:"Cabanadas (PE)",era:"imperio",eraLabel:"Período Imperial",date:"1832–1835",loc:"Pernambuco e Alagoas",latlng:[-9.0,-37.0],lideres:"Vicente de Paula (principal líder, décadas como foragido); Padre Agostinho",gov:"Regência do Império — período de grande instabilidade pós-abdicação de D. Pedro I (1831).",reiv:"Revolta de pobres rurais, índios e mestiços leais a D. Pedro I, contra os liberais que tomaram o poder. Paradoxalmente conservadora: defendia a volta do imperador contra as mudanças liberais das elites locais.",conseq:"Supressão violenta. 3.000–6.000 mortos. Vicente de Paula continuou resistindo por mais de 20 anos. Revelou a complexidade da política popular no Nordeste.",legado:"Demonstra que os pobres do sertão podiam ser conservadores por oposição às oligarquias liberais que os oprimiam. Paradoxo que se repetiria em Canudos e no Contestado.",pext:"Ocorreu logo após a abdicação de D. Pedro I, que foi a Portugal. Criou preocupação em Lisboa sobre a estabilidade do Brasil e o risco de fragmentação do território."},confederacao:{title:"Confederação do Equador",era:"imperio",eraLabel:"Período Imperial",date:"1824",loc:"Pernambuco (e CE, PB, RN)",latlng:[-7.5,-35.8],lideres:"Manuel de Carvalho Paes de Andrade (presidente); frei Caneca (ideólogo, executado); Cipriano Barata",gov:"D. Pedro I — 1º Reinado. A confederação foi suprimida pelo próprio imperador recém-coroado.",reiv:"Revolta republicana e federalista em Pernambuco contra a dissolução da Assembleia Constituinte por D. Pedro I (1823) e contra a Constituição outorgada de 1824, considerada centralizadora. Proclamou república independente que deveria reunir as províncias do Nordeste.",conseq:"Suprimida militarmente em setembro de 1824. Frei Caneca foi fuzilado (o carrasco recusou-se a enforcá-lo). Múltiplos líderes executados ou deportados. D. Pedro I demonstrou que usaria a força para manter a unidade territorial.",legado:"Frei Caneca tornou-se o maior mártir do republicanismo nordestino. Marco da tradição liberal e federalista de Pernambuco — que explodiu também em 1817, 1824 e 1848. Evento central para entender a construção forçada da unidade nacional brasileira pós-Independência.",pext:"Ocorreu logo após a Independência (1822) — num momento em que o Brasil ainda buscava reconhecimento internacional. A repressão foi elogiada pelos aliados europeus preocupados com o 'contágio' republicano. A Inglaterra monitorava a estabilidade do novo Império."},revoltas1842:{title:"Revoltas Liberais de 1842",era:"imperio",eraLabel:"Período Imperial",date:"1842",loc:"São Paulo e Minas Gerais",latlng:[-20.5,-45.5],lideres:"SP: Rafael Tobias de Aguiar; Feijó. MG: Teófilo Ottoni; padre Feliciano",gov:"D. Pedro II — início do 2º Reinado. Gabinete conservador de Honório Hermeto Carneiro Leão.",reiv:"Revolta dos liberais de SP e MG contra a vitória eleitoral fraudulenta dos conservadores e contra a Lei Interpretativa do Ato Adicional (1840), que reverteu as conquistas federalistas e aumentou o centralismo imperial.",conseq:"Revolta suprimida por Caxias em poucos meses. Líderes presos e anistiados depois. Evidenciou que o bipartidarismo imperial era estruturalmente instável — os partidos alternavam no poder por decreto imperial, não por vontade popular.",legado:"Revelou que o 'parlamentarismo às avessas' do Império — em que o imperador escolhia o partido no poder — gerava crises cíclicas. Teófilo Ottoni tornou-se o maior líder liberal do 2º Reinado.",pext:"Demonstrou ao mundo que o Império, recém-estabilizado, ainda enfrentava instabilidade séria. Portugal e Inglaterra monitoravam — a fragilidade do Império poderia abrir espaço para influências republicanas estrangeiras."},canudos:{title:"Guerra de Canudos",era:"rep-velha",eraLabel:"República Velha",date:"1896–1897",loc:"Bahia (sertão — Belo Monte)",latlng:[-10.5,-39.3],lideres:"Antônio Conselheiro; Comandante Pajéu; João Abade",gov:"Prudente de Morais (1894–1898) — 1º presidente civil da República.",reiv:"Comunidade religiosa milenarista no sertão baiano. Resistência à República, à cobrança de impostos e ao recrutamento forçado. Conselheiro pregava o reino de Deus na terra e a volta da monarquia.",conseq:"Quatro expedições militares. Canudos destruída completamente (out. 1897). 15.000–25.000 mortos. Degola sistemática dos sobreviventes. Narrada por Euclides da Cunha em 'Os Sertões' (1902).",legado:"'Os Sertões' é obra fundadora da literatura e do pensamento social brasileiro. Revelou o abismo entre o Brasil litorâneo/republicano e o Brasil do sertão. Símbolo da violência do Estado contra populações pobres.",pext:"Interpretado internacionalmente como sinal de instabilidade da jovem República. A narrativa de 'restauração monarquista' levantou suspeitas de envolvimento britânico — nunca comprovado."},federalista:{title:"Revolução Federalista",era:"rep-velha",eraLabel:"República Velha",date:"1893–1895",loc:"Rio Grande do Sul (e SC, PR)",latlng:[-29,-52],lideres:"Gaspar Silveira Martins (líder político); Gumercindo Saraiva (comandante militar); Joca Tavares",gov:"Floriano Peixoto (1891–1894) — 'Marechal de Ferro'. Depois: Prudente de Morais.",reiv:"Conflito entre republicanos positivistas (pica-paus, PRR de Castilhos) e federalistas (maragatos). Os federalistas defendiam o parlamentarismo e maior autonomia dos estados.",conseq:"Paz de Pelotas (1895). Vitória dos republicanos. Mais de 10.000 mortos. Famosa pelas 'degolas'. Consolidação do presidencialismo republicano nacional.",legado:"Formou a cultura política gaúcha que produziria Vargas. Derrota definitiva do parlamentarismo no Brasil. Érico Veríssimo imortalizou o conflito em 'O Tempo e o Vento'.",pext:"Conflito simultâneo à Revolta da Armada (1893–94). Argentina acusada de dar suporte aos maragatos. Floriano resistiu em duas frentes — garantindo o reconhecimento externo da República."},contestado:{title:"Guerra do Contestado",era:"rep-velha",eraLabel:"República Velha",date:"1912–1916",loc:"Santa Catarina / Paraná",latlng:[-26.5,-51.5],lideres:"José Maria (líder inicial, morto em 1912); Maria Rosa (jovem líder mística); Eusébio Ferreira",gov:"Hermes da Fonseca (1910–1914); Wenceslau Brás (1914–1918).",reiv:"Sertanejos expulsos de suas terras pela construção da estrada de ferro São Paulo–Rio Grande (empresa americana Brazil Railway). Caráter messiânico: combatiam a República como governo do anticristo.",conseq:"8.000–20.000 mortos. Destruição de vilas inteiras. Exigiu intervenção federal. Revelou o abandono total do Estado republicano em relação ao interior.",legado:"Ao lado de Canudos, símbolo do Brasil profundo ignorado pela República oligárquica. Evidenciou a questão agrária como bomba-relógio social.",pext:"A empresa americana Brazil Railway no centro da questão criou constrangimento diplomático com os EUA. O governo equilibrou proteção a interesses americanos com a repressão aos sertanejos."},chibata:{title:"Revolta da Chibata",era:"rep-velha",eraLabel:"República Velha",date:"Novembro de 1910",loc:"Rio de Janeiro (Baía de Guanabara)",latlng:[-22.9,-43.2],lideres:"João Cândido Felisberto ('O Almirante Negro')",gov:"Hermes da Fonseca (recém-empossado em novembro de 1910).",reiv:"Marinheiros — majoritariamente negros, recrutados à força — rebelaram-se contra as chibatadas (punição permitida pelo regulamento naval). Exigiam abolição dos castigos corporais, melhoria da alimentação e aumento de salários.",conseq:"Governo prometeu anistia, depois a revogou. João Cândido expulso, internado em hospício. Dezenas morreram na Ilha das Cobras. A chibata foi abolida formalmente.",legado:"Símbolo da resistência negra no Brasil republicano. João Cândido celebrado por artistas e intelectuais do século XX. Expôs o racismo estrutural das Forças Armadas.",pext:"A revolta ocorreu com os maiores encouraçados da América do Sul recém-adquiridos. Jornais europeus e americanos cobriam a crise. Revelou a fragilidade da ambição naval brasileira de projeção regional."},cangaco:{title:"Cangaço",era:"rep-velha",eraLabel:"Rep. Velha / Era Vargas",date:"c. 1870–1940 (auge: 1900–1938)",loc:"Nordeste (PE, BA, CE, PB, SE, AL, RN, PI)",latlng:[-7.5,-37.5],lideres:"Virgulino Ferreira da Silva ('Lampião'); Maria Bonita; Antônio Silvino",gov:"Múltiplos presidentes da Rep. Velha; Getúlio Vargas (morte de Lampião, 1938).",reiv:"Banditismo social no sertão nordestino — resultado da seca, da miséria, da violência dos coronéis e da ausência do Estado. Não era movimento político organizado, mas resposta à estrutura agrária excludente.",conseq:"Morte de Lampião e Maria Bonita em 1938 (emboscada da polícia baiana). O Estado Varguista, ao modernizar a polícia e o controle territorial, encerrou o fenômeno.",legado:"Lampião e Maria Bonita tornaram-se ícones culturais — cinema, literatura, cordel, artes plásticas. O cangaço revela as condições estruturais do Nordeste: concentração fundiária, coronelismo, seca, ausência do Estado.",pext:"O cangaço era visto por observadores externos como símbolo do 'atraso' brasileiro. A imagem de Lampião circulou na imprensa europeia e americana dos anos 1930. Governos evitavam o tema em foros internacionais."},vacinaRJ:{title:"Revolta da Vacina",era:"rep-velha",eraLabel:"República Velha",date:"Novembro de 1904",loc:"Rio de Janeiro (capital federal)",latlng:[-22.91,-43.18],lideres:"Lauro Sodré (senador oposicionista); população pobre e operária do Rio; florianistas descontentes",gov:"Rodrigues Alves (1902–1906) — São Paulo. Ministro da Saúde: Oswaldo Cruz.",reiv:"Insurreição popular contra a lei que tornava obrigatória a vacinação contra a varíola. A população pobre do Rio associava a vacinação à violação de domicílio e ao autoritarismo das reformas urbanas de Pereira Passos, que demoliu cortiços e expulsou os pobres do centro da cidade.",conseq:"Cerca de 945 pessoas deportadas para o Acre. Dezenas de mortos nos confrontos. A vacinação obrigatória foi suspensa — mas retomada depois. Contemporânea a uma tentativa de golpe florianista, o que aumentou a repressão.",legado:"Símbolo da resistência popular urbana contra políticas autoritárias de saúde pública. Debate sobre Estado, corpo e liberdade individual que ressurgiu com força na pandemia de COVID-19.",pext:"Ocorreu no contexto do sanitarismo internacional: as potências europeias e os EUA pressionavam países tropicais a controlar epidemias que afetavam o comércio marítimo. A revolta constrangeu a agenda modernizadora do Rio."},armada:{title:"Revolta da Armada",era:"rep-velha",eraLabel:"República Velha",date:"1893–1894",loc:"Rio de Janeiro (Baía de Guanabara e sul do Brasil)",latlng:[-22.85,-43.15],lideres:"Almirante Custódio de Melo; Almirante Luís Filipe Saldanha da Gama",gov:"Floriano Peixoto (1891–1894) — 'Marechal de Ferro'.",reiv:"Revolta da Marinha de Guerra contra o governo de Floriano Peixoto. Os oficiais navais — com simpatias monarquistas — tentaram forçar a renúncia de Floriano (que assumira sem eleição direta). Conectou-se à Revolução Federalista no Sul.",conseq:"Floriano resistiu por meses. A chegada de navios americanos na Baía de Guanabara enfraqueceu os revoltosos. Derrota completa em março de 1894. Saldanha da Gama morreu na campanha do Sul.",legado:"Consolidou a hegemonia do Exército sobre a Marinha nas Forças Armadas brasileiras. Floriano tornou-se herói republicano. A intervenção americana favorável a Floriano criou precedente de apoio dos EUA ao governo federal.",pext:"A intervenção americana (neutralidade ativa a favor de Floriano) foi decisiva. O apoio implícito americano na crise da Armada estabeleceu os EUA como fiadores da ordem republicana brasileira — antecipando o alinhamento que dominaria o século XX."},forte1922:{title:"Revolta dos 18 do Forte de Copacabana",era:"rep-velha",eraLabel:"República Velha",date:"5 de julho de 1922",loc:"Rio de Janeiro (Forte de Copacabana)",latlng:[-22.99,-43.19],lideres:"Tenente Siqueira Campos; Eduardo Gomes; Newton Prado (morto na praia); 18 revoltosos que marcharam pela orla",gov:"Epitácio Pessoa (1919–1922) — Paraíba.",reiv:"Primeira grande revolta do tenentismo. Jovens oficiais do Exército levantaram-se contra o fechamento do Clube Militar e o estado de sítio decretado por Epitácio Pessoa. Protestavam contra a República oligárquica, a fraude eleitoral e a exclusão dos militares da política.",conseq:"Revolta rapidamente sufocada. 18 rebeldes marcharam pela praia de Copacabana contra forças imensamente superiores — ato suicida que virou lenda. Siqueira Campos e Eduardo Gomes sobreviveram. O episódio gerou o mito tenentista.",legado:"Os '18 do Forte' tornaram-se mártires do tenentismo. Eduardo Gomes tornou-se candidato presidencial em 1945 e 1950 (UDN). O episódio inaugurou o ciclo tenentista que culminou na Revolução de 1930.",pext:"A revolta de 1922 ocorreu no mesmo ano da Semana de Arte Moderna e do centenário da Independência. A instabilidade militar brasileira era acompanhada de perto por Argentina e EUA, atentos à balança de poder na América do Sul."},coluna:{title:"Coluna Prestes",era:"rep-velha",eraLabel:"República Velha",date:"1925–1927",loc:"Travessia do interior do Brasil (partiu do RS)",latlng:[-10,-55],lideres:"Luís Carlos Prestes ('O Cavaleiro da Esperança'); Miguel Costa; Juarez Távora",gov:"Artur Bernardes (1922–1926) — governo sob estado de sítio permanente.",reiv:"Militares tenentistas marcharam 25.000 km pelo interior denunciando o coronelismo, a fraude eleitoral e a miséria. Sem programa claro, mas com forte apelo popular e simbólico.",conseq:"A Coluna nunca foi derrotada militarmente — exilou-se na Bolívia em 1927. Preparou o terreno ideológico para a Revolução de 1930. Prestes tornou-se lenda nacional.",legado:"Prestes tornou-se o maior líder comunista do Brasil. A Coluna é marco do tenentismo que catalisaria a Era Vargas. Revelou o Brasil profundo, desconhecido das elites litorâneas.",pext:"A travessia de regiões fronteiriças criou tensões diplomáticas com Bolívia, Paraguai e Argentina. O exílio na Bolívia rendeu negociações entre governos. Prestes, ao filiar-se ao PCB, conectou o tenentismo ao comunismo internacional."},greve1917:{title:"Greve Geral de 1917",era:"rep-velha",eraLabel:"República Velha",date:"Julho de 1917",loc:"São Paulo (e outras capitais)",latlng:[-23.55,-46.63],lideres:"Movimento anarco-sindicalista difuso. Liga Operária de SP; FORP; jornal 'A Plebe'",gov:"Wenceslau Brás (1914–1918) — contexto da 1ª Guerra Mundial.",reiv:"200.000 trabalhadores em greve em São Paulo. Exigiam aumento de salários (hiperinflação da guerra), jornada de 8 horas, fim do trabalho infantil e melhores condições nas fábricas têxteis.",conseq:"Governo e patrões cederam parcialmente: aumento de 20% nos salários. Repressão posterior aos líderes anarquistas. O movimento anarco-sindicalista enfraqueceu nos anos 1920.",legado:"Maior mobilização operária da República Velha. Precursora do trabalhismo varguista: a CLT (1943) foi a resposta de Vargas ao que a greve de 1917 havia exigido — cooptação em vez de confronto.",pext:"Ocorreu no contexto da 1ª Guerra e da Revolução Russa. Amplificou o temor de bolchevismo. Contribuiu para a paranoia anticomunista que marcaria a política externa brasileira por décadas."},revolucao1929:{title:"Revolta de 1924 / Revolução de 1930 (SP)",era:"rep-velha",eraLabel:"República Velha",date:"1924 (levante); 1930 (revolução)",loc:"São Paulo",latlng:[-23.2,-46.9],lideres:"1924: General Isidoro Dias Lopes; Miguel Costa. 1930: Getúlio Vargas; Aliança Liberal",gov:"1924: Artur Bernardes. 1930: Washington Luís (derrubado pela revolução).",reiv:"1924: Levante tenentista em São Paulo — militares tomaram a cidade por 3 semanas antes de recuar para o interior (dando origem à Coluna Prestes). 1930: Revolução que derrubou a República Velha após a fraude eleitoral que deu vitória a Júlio Prestes em detrimento da Aliança Liberal.",conseq:"1924: Levante sufocado, mas Isidoro e Miguel Costa marcharam pelo interior — semente da Coluna Prestes. 1930: Vargas assume o poder em 3 de novembro — fim da República Velha e início da Era Vargas.",legado:"O levante de 1924 é o elo entre o tenentismo de 1922 e a Coluna Prestes (1925–27). A Revolução de 1930 é um dos eventos mais transformadores da história brasileira — reconfigurou o Estado, a economia e a política por décadas.",pext:"A Revolução de 1930 ocorreu no contexto da Grande Depressão (1929), que devastou os preços do café e enfraqueceu a oligarquia paulista. Os EUA e a Inglaterra monitoraram atentamente a transição de poder no maior país da América do Sul."},constitucionalista:{title:"Revolução Constitucionalista",era:"vargas",eraLabel:"Era Vargas",date:"9 jul – 2 out 1932 (87 dias)",loc:"São Paulo",latlng:[-22.5,-48.5],lideres:"General Bertoldo Klinger; Isidoro Dias Lopes; Frente Única Paulista (FUP: PRP + PD)",gov:"Getúlio Vargas — Governo Provisório (1930–1934).",reiv:"São Paulo exigiu uma nova Constituição contra o governo por decreto de Vargas. Lema: 'Constituição já!' Mistura de reivindicação democrática legítima com reação oligárquica ao poder gaúcho.",conseq:"Derrota militar paulista em 87 dias. Vitória política: Vargas convocou a Constituinte → Constituição de 1934 (voto feminino, voto secreto, direitos trabalhistas, Justiça Eleitoral). Fundação da USP em 1934.",legado:"Paradoxo histórico: SP perdeu a guerra e ganhou a paz. A Constituição de 1934 foi resposta à pressão constitucionalista. 9 de julho é feriado estadual em SP. A USP tornou-se a maior universidade da América Latina.",pext:"Revelou internacionalmente a fragilidade do regime Vargas. Limitou a margem de manobra diplomática num momento crucial — ascensão do nazifascismo europeu e pressões americanas."},intentona:{title:"Intentona Comunista",era:"vargas",eraLabel:"Era Vargas",date:"23–27 nov 1935",loc:"Natal (RN), Recife (PE) e Rio de Janeiro",latlng:[-5.79,-35.21],lideres:"Luís Carlos Prestes; Harry Berger (agente da Comintern); Rodolfo Ghioldi (PCB argentino)",gov:"Getúlio Vargas (Governo Constitucional, 1934–1937).",reiv:"Levante do PCB e da ANL com apoio da Comintern (Moscou). Buscava derrubar Vargas e implantar governo popular-revolucionário. Influência da estratégia da Frente Popular comunista internacional.",conseq:"Derrota em menos de uma semana. Centenas de presos e torturados. Olga Benário Prestes extraditada para a Alemanha nazista — morreu em campo de concentração. Vargas usou o episódio para decretar o Estado Novo (1937).",legado:"Serviu de pretexto para o Estado Novo. O 'Plano Cohen' (forjado) justificou o golpe. A extradição de Olga Benário é um dos episódios mais sombrios da política externa brasileira.",pext:"A extradição de Olga para a Alemanha nazista revelou a ambiguidade de Vargas entre democratas e fascistas. Moscou rompeu relações com o Brasil. Protestos internacionais de grupos de direitos humanos."},araguaia:{title:"Guerrilha do Araguaia",era:"militar",eraLabel:"Ditadura Militar",date:"1972–1974",loc:"Sul do Pará (fronteira PA/MT/GO)",latlng:[-8.5,-50.5],lideres:"PC do B: João Amazonas, Maurício Grabois. Guerrilheiros: Osvaldo Orlando Costa; Maria Lúcia Petit; Paulo Fonteles",gov:"General Emílio Garrastazu Médici (1969–1974) — ápice da repressão.",reiv:"Tentativa do PC do B de criar guerrilha rural maoísta na Amazônia para derrubar a ditadura. Militantes foram ao Araguaia anos antes para integrar-se às comunidades locais e criar foco guerrilheiro.",conseq:"Extermínio total: ~70 militantes mortos. Exército usou terra arrasada, queima de aldeias, tortura de camponeses. Corpos nunca integralmente localizados. Ocultação sistemática até 2007 (CNV).",legado:"Símbolo da resistência armada à ditadura. A localização dos restos mortais permanece ferida aberta. Tema central da Comissão Nacional da Verdade (2011–2014).",pext:"Em 2010, a Corte IDH (caso Gomes Lund vs. Brasil) condenou o Brasil por desaparecimentos forçados e pela Lei de Anistia como obstáculo à verdade. Episódio central nas tensões com o sistema interamericano de DH."},carajas:{title:"Massacre de Eldorado dos Carajás",era:"nova-rep",eraLabel:"Nova República",date:"17 de abril de 1996",loc:"Eldorado dos Carajás, Pará",latlng:[-6.1,-49.3],lideres:"Sem-terra do MST (sem lideranças formais). Coronel Mário Pantoja e Major José Oliveira (PM-PA) foram condenados.",gov:"Fernando Henrique Cardoso — 1º mandato (1995–1999).",reiv:"Sem-terra do MST bloqueavam rodovia PA-150 exigindo a aceleração da reforma agrária e o assentamento de famílias em terras improdutivas da região.",conseq:"19 sem-terra mortos pela PM do Pará; dezenas de feridos. Imagens chocantes circularam globalmente. Pressão enorme sobre o governo FHC para acelerar a reforma agrária. O 17 de abril tornou-se o Dia Internacional da Luta Camponesa.",legado:"Fortaleceu o MST e gerou solidariedade internacional ao campesinato brasileiro. A data é reconhecida mundialmente pela La Via Campesina. Pôs a questão fundiária no centro da agenda política dos anos 1990–2000.",pext:"Repercussão imediata: relatórios da Anistia Internacional, HRW e ONU criticaram o Brasil. Constrangeu o governo FHC, que buscava inserção internacional como democracia consolidada e candidato a membro permanente do CSNU."},palmares:{title:"Guerra dos Palmares",era:"colonial",eraLabel:"Período Colonial",date:"c. 1600–1695",loc:"Alagoas e Pernambuco",latlng:[-9.3,-36.5],lideres:"Zumbi dos Palmares (último e mais célebre líder); Ganga Zumba (líder anterior, negociou com Portugal)",gov:"Portugal — múltiplos governadores-gerais. Domingos Jorge Velho liderou a expedição final que destruiu Palmares (1694).",reiv:"O Quilombo dos Palmares foi a maior e mais duradoura comunidade de africanos escravizados fugidos das Américas. Com cerca de 30.000 habitantes no auge, era um Estado organizado que resistiu por quase um século a dezenas de expedições militares. Não era uma revolta com reivindicações — era uma sociedade alternativa que simplesmente recusava a escravidão.",conseq:"Palmares foi destruído em 1694. Zumbi, que recusou a negociação, foi capturado e decapitado em 20 de novembro de 1695. Sua cabeça foi exposta em praça pública em Recife. O quilombo nunca se recompôs nessa escala.",legado:"Zumbi é o maior símbolo da resistência negra no Brasil. O 20 de novembro é o Dia da Consciência Negra — feriado nacional desde 2011. Palmares é referência mundial para estudos sobre resistência escrava, quilombismo e diáspora africana.",pext:"A existência de Palmares preocupava tanto Portugal quanto a Holanda (que também tentou destruir o quilombo). Palmares demonstrava que a escravidão era frágil e contestável — argumento que alimentaria o abolicionismo britânico."},beckman:{title:"Revolta de Beckman",era:"colonial",eraLabel:"Período Colonial",date:"1684",loc:"Maranhão (São Luís)",latlng:[-2.53,-44.3],lideres:"Manuel Beckman ('Bequimão'); Tomás Beckman; Jorge de Sampaio",gov:"Portugal — Regência de D. Pedro (futuro D. Pedro II de Portugal). Capitania do Maranhão.",reiv:"Revolta dos colonos do Maranhão contra o monopólio da Companhia de Comércio do Estado do Maranhão e contra os jesuítas, acusados de impedir a escravidão indígena. Primeira revolta colonial organizada do Brasil.",conseq:"Beckman foi preso e executado em 1685 quando as forças portuguesas retomaram o controle. A Companhia de Comércio foi extinta. Vitória parcial dos colonos na questão econômica, derrota política.",legado:"Considerada a primeira revolta de colonos brasileiros contra o poder metropolitano português. Antecipou em um século os conflitos nativistas do século XVIII. Símbolo da resistência à exploração econômica colonial.",pext:"Evidenciou para Portugal a fragilidade do controle sobre as capitanias do norte. A revolta preocupou a Coroa quanto à lealdade dos colonos e levou a revisões na política de monopólios comerciais."},emboabas:{title:"Guerra dos Emboabas",era:"colonial",eraLabel:"Período Colonial",date:"1708–1709",loc:"Minas Gerais (região das minas de ouro)",latlng:[-19.5,-43.8],lideres:"Manuel Nunes Viana ('Rei dos Emboabas') — líder dos forasteiros; Paulistas liderados por Borba Gato",gov:"Portugal — D. João V. Governador-geral do Brasil: Dom Lourenço de Almeida (depois).",reiv:"Conflito entre paulistas (descobridores das minas de ouro) e 'emboabas' (forasteiros — portugueses e outros colonos) pelo controle das minas auríferas de Minas Gerais. Os paulistas reclamavam exclusividade sobre o ouro que haviam descoberto.",conseq:"Vitória dos emboabas. Portugal aproveitou o conflito para intervir e assumir controle direto da região: criação da Capitania de Minas Gerais (1720). Paulistas foram excluídos das minas e partiram para outras expedições (que resultaram na descoberta do Mato Grosso e Goiás).",legado:"Acelerou a organização administrativa colonial no interior do Brasil. Revelou os limites do poder português sobre os conflitos entre colonos. A exclusão dos paulistas das minas estimulou novas bandeiras que expandiram o território.",pext:"Preocupou Portugal com a governabilidade da colônia mais lucrativa. A solução administrativa (criação da capitania) foi modelo de intervenção colonial. A Espanha monitorava a riqueza mineral do Brasil."},mascates:{title:"Guerra dos Mascates",era:"colonial",eraLabel:"Período Colonial",date:"1710–1711",loc:"Pernambuco (Olinda vs. Recife)",latlng:[-8.1,-34.95],lideres:"Bernardo Vieira de Melo (líder olindense); comerciantes portugueses do Recife",gov:"Portugal — D. João V. Governador de Pernambuco: Felix José Machado.",reiv:"Conflito entre a aristocracia rural açucareira de Olinda (endividada) e os comerciantes portugueses ('mascates') do Recife, que dominavam o crédito. Recife foi elevada à condição de vila independente (1709), o que provocou a revolta de Olinda.",conseq:"Recife manteve o status de vila autônoma. Líderes olindenses presos e depois anistiados. Portugal fortaleceu Recife como centro urbano — ela se tornaria capital de Pernambuco. Olinda perdeu definitivamente a hegemonia regional.",legado:"Revelou o conflito de classes no interior da colônia: aristocracia rural vs. burguesia comercial. Antecipou contradições que explodiram na Revolução Pernambucana de 1817 e na Praieira (1848).",pext:"Demonstrou à Coroa portuguesa a necessidade de equilibrar interesses de colonos antigos e comerciantes metropolitanos. Recife cresceu como porto estratégico para o açúcar — produto central da economia atlântica do século XVIII."},filipe:{title:"Revolta de Filipe dos Santos",era:"colonial",eraLabel:"Período Colonial",date:"1720",loc:"Minas Gerais (Vila Rica / Ouro Preto)",latlng:[-20.38,-43.5],lideres:"Pascoal da Silva Guimarães; Filipe dos Santos (alfaiate e tropeiro — único executado); figuras da elite mineira",gov:"Portugal — D. João V. Governador das Minas: Conde de Assumar.",reiv:"Revolta contra a criação das Casas de Fundição (que monopolizariam a transformação do ouro bruto em barras) e contra a Derrama (cobrança coercitiva de impostos atrasados). Primeira articulação de elites coloniais contra a metrópole em Minas.",conseq:"Revolta sufocada antes de eclodir. Filipe dos Santos foi o único executado — tornou-se símbolo popular. Os líderes da elite foram deportados. A Casa de Fundição foi suspensa — vitória parcial dos colonos.",legado:"Antecessora direta da Inconfidência Mineira (1789). Demonstrou que as elites mineradoras estavam dispostas a resistir à exploração fiscal. Filipe dos Santos, homem pobre executado pelos crimes dos ricos, tornou-se ícone popular.",pext:"Revelou a tensão estrutural entre a Coroa e as elites coloniais sobre a extração do ouro. Portugal recuou na Casa de Fundição, mas manteve a pressão fiscal — que explodiu na Inconfidência 69 anos depois."},inconfidencia:{title:"Inconfidência Mineira",era:"colonial",eraLabel:"Período Colonial",date:"1788–1789",loc:"Minas Gerais (Vila Rica / Ouro Preto)",latlng:[-20.8,-43.8],lideres:"Tiradentes (Joaquim José da Silva Xavier) — único executado; Tomás Antônio Gonzaga; Cláudio Manuel da Costa; padre Carlos Correia de Toledo",gov:"Portugal — D. Maria I ('A Louca'). Visconde de Barbacena, governador de Minas.",reiv:"Conspiração das elites mineiras (militares, padres, intelectuais, fazendeiros) contra o domínio colonial português. Motivações: a Derrama iminente (cobrança de impostos atrasados), influência do Iluminismo e da Revolução Americana (1776). Objetivo: independência de Minas e criação de república.",conseq:"Conspiração denunciada antes de eclodir. Tiradentes foi o único enforcado e esquartejado (1792) — os demais foram degredados para a África. A Derrama foi suspensa. Nenhuma república foi proclamada.",legado:"Símbolo máximo da luta pela independência brasileira. Tiradentes é herói nacional e mártir cívico — 21 de abril é feriado nacional. A Inconfidência inspirou gerações de republicanos e nacionalistas.",pext:"Ocorreu no contexto da Revolução Americana (1776) e pouco antes da Francesa (1789). A influência iluminista foi direta. Portugal ficou extremamente alarmado — a perda de Minas significaria o fim do ciclo do ouro."},conjuracao_baiana:{title:"Conjuração Baiana (Revolta dos Alfaiates)",era:"colonial",eraLabel:"Período Colonial",date:"1798",loc:"Bahia (Salvador)",latlng:[-12.5,-38.8],lideres:"João de Deus do Nascimento; Manuel Faustino dos Santos Lira; Lucas Dantas (todos enforcados — eram negros e pardos pobres)",gov:"Portugal — D. Maria I. Governador da Bahia: D. Fernando José de Portugal.",reiv:"Conspiração de soldados, artesãos, negros livres e escravos em Salvador. Influência da Revolução Francesa e do Haiti (1791). Reivindicavam: independência da Bahia, república, liberdade dos escravos, igualdade racial e livre comércio. A conspiração mais radical e popular do período colonial.",conseq:"Conspiração delatada. Quatro líderes enforcados e esquartejados (todos negros e pardos pobres). Os intelectuais brancos envolvidos foram apenas degredados — justiça racialmente desigual. Salvador permaneceu sob rígido controle colonial.",legado:"A mais radical das conspirações coloniais: única a incluir explicitamente a abolição da escravidão e a igualdade racial. O contraste entre a execução dos pobres negros e a impunidade dos ricos brancos é denúncia do racismo estrutural do período.",pext:"Ocorreu no contexto da Revolução do Haiti (1791) — o que aterrorizou as elites escravocratas de toda a América. Portugal intensificou a repressão e o controle sobre movimentos de ideias iluministas na colônia."},rev1817:{title:"Revolução Pernambucana de 1817",era:"colonial",eraLabel:"Período Colonial (Joanino)",date:"1817",loc:"Pernambuco (Recife e sertão)",latlng:[-8.05,-34.95],lideres:"Domingos José Martins; padre João Ribeiro; Gervásio Pires Ferreira; padre Roma (executado)",gov:"D. João VI — Corte portuguesa instalada no Rio de Janeiro desde 1808.",reiv:"Proclamação de uma república em Pernambuco por militares, padres, comerciantes e proprietários. Influência do Iluminismo, da Revolução Americana e Francesa. Reivindicavam república, liberdade de comércio e autonomia — mas não abolição da escravidão (temiam o exemplo haitiano).",conseq:"República durou 74 dias. Tropas enviadas do Rio esmagaram o movimento. Líderes executados ou presos. Padre Roma foi fuzilado ao tentar aliciar a Bahia. Pernambuco permaneceu sob vigilância intensa.",legado:"Precursora direta da Confederação do Equador (1824) e da Praieira (1848). Revelou Pernambuco como polo de resistência ao centralismo. Tradição republicana e federalista pernambucana que atravessou o século XIX.",pext:"Ocorreu com D. João VI no Brasil — o que tornava a revolta contra a própria Coroa transplantada. A revolução preocupou os aliados europeus de Portugal (especialmente a Inglaterra). A república de Pernambuco tentou contatos com os EUA."}};

const eraColors={colonial:'#d4a017',imperio:'#c0852b','rep-velha':'#3498db',vargas:'#e74c3c',democracia:'#2ecc71',militar:'#95a5a6','nova-rep':'#9b59b6'};

const map=L.map('map',{center:[-15,-53],zoom:4,minZoom:3,maxZoom:9,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20}).addTo(map);

// Siglas e centroides dos 27 estados
const estados = [
  {sig:'AC',ll:[-9.02,-70.81]},{sig:'AL',ll:[-9.57,-36.78]},{sig:'AP',ll:[1.41,-51.77]},
  {sig:'AM',ll:[-3.47,-65.10]},{sig:'BA',ll:[-12.96,-41.70]},{sig:'CE',ll:[-5.20,-39.53]},
  {sig:'DF',ll:[-15.83,-47.86]},{sig:'ES',ll:[-19.19,-40.34]},{sig:'GO',ll:[-15.98,-49.86]},
  {sig:'MA',ll:[-5.42,-45.44]},{sig:'MT',ll:[-12.64,-55.42]},{sig:'MS',ll:[-20.51,-54.54]},
  {sig:'MG',ll:[-18.10,-44.38]},{sig:'PA',ll:[-3.79,-52.48]},{sig:'PB',ll:[-7.28,-36.72]},
  {sig:'PR',ll:[-24.89,-51.55]},{sig:'PE',ll:[-8.81,-36.95]},{sig:'PI',ll:[-7.72,-42.73]},
  {sig:'RJ',ll:[-22.25,-42.66]},{sig:'RN',ll:[-5.81,-36.59]},{sig:'RS',ll:[-30.03,-53.20]},
  {sig:'RO',ll:[-11.22,-62.80]},{sig:'RR',ll:[1.99,-61.33]},{sig:'SC',ll:[-27.45,-50.95]},
  {sig:'SP',ll:[-22.25,-48.65]},{sig:'SE',ll:[-10.57,-37.45]},{sig:'TO',ll:[-10.18,-48.33]}
];

// Estilo dos labels — injetado uma vez
const labelStyle = document.createElement('style');
labelStyle.textContent = `
  .state-label {
    background: none !important;
    border: none !important;
    box-shadow: none !important;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: rgba(201,168,76,0.55);
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
  }
`;
document.head.appendChild(labelStyle);

fetch('https://servicodados.ibge.gov.br/api/v3/malhas/paises/BR?formato=application/vnd.geo+json&qualidade=minima&intrarregiao=UF')
  .then(r=>r.json()).then(g=>{
    L.geoJSON(g,{style:{fillColor:'#1a2e1e',fillOpacity:.75,color:'#3d6645',weight:.8,opacity:.9}}).addTo(map);
    // Adicionar siglas após o GeoJSON carregar
    addStateLabels();
  }).catch(()=>{
    // Mesmo sem GeoJSON, mostrar as siglas
    addStateLabels();
  });

function addStateLabels() {
  estados.forEach(({sig, ll}) => {
    L.marker(ll, {
      icon: L.divIcon({
        className: 'state-label',
        html: sig,
        iconSize: null,
        iconAnchor: [12, 8]
      }),
      interactive: false,
      zIndexOffset: -1000
    }).addTo(map);
  });
}

const markers={};
function makeIcon(era){const c=eraColors[era]||'#c9a84c';return L.divIcon({className:'',html:`<div style="width:16px;height:16px;border-radius:50%;background:${c};border:2px solid rgba(255,255,255,.15);box-shadow:0 0 0 3px ${c}44,0 0 14px ${c}99;cursor:pointer;"></div>`,iconSize:[16,16],iconAnchor:[8,8]});}

Object.entries(C).forEach(([id,c])=>{
  const m=L.marker(c.latlng,{icon:makeIcon(c.era)}).addTo(map);
  m.on('click',()=>openPopup(id));
  m.bindTooltip(`<b>${c.title}</b><br><span style="opacity:.7">${c.date}</span>`,{direction:'top',offset:[0,-6],className:'cacd-tooltip'});
  markers[id]=m;
});

function buildSidebar(){
  const sl=document.getElementById('slist');sl.innerHTML='';
  const total=Object.keys(C).length;
  document.getElementById('count').textContent=total;
  Object.entries(C).forEach(([id,c])=>{
    const d=document.createElement('div');d.className='si';d.dataset.era=c.era;d.onclick=()=>openPopup(id);
    d.innerHTML=`<div class="si-dot" style="background:${eraColors[c.era]}"></div><div><div class="si-name">${c.title}</div><div class="si-sub">${c.date}</div></div>`;
    sl.appendChild(d);
  });
}

function openPopup(id){
  const c=C[id];if(!c)return;
  const col=eraColors[c.era]||'#c9a84c';
  const $=i=>document.getElementById(i);
  $('p-tag').textContent=c.eraLabel;$('p-tag').style.cssText=`background:${col}22;color:${col};border:1px solid ${col}55`;
  $('p-title').textContent=c.title;$('p-date').textContent=c.date;$('p-loc').textContent=c.loc;
  $('p-lideres').textContent=c.lideres;$('p-gov').textContent=c.gov;$('p-reiv').textContent=c.reiv;
  $('p-conseq').textContent=c.conseq;$('p-legado').textContent=c.legado;$('p-pext').textContent=c.pext;
  $('popup').style.borderTop=`3px solid ${col}`;
  document.getElementById('overlay').classList.add('open');
  map.panTo(c.latlng,{animate:true,duration:.5});
}

function closePopup(){document.getElementById('overlay').classList.remove('open');}
function closeIfBg(e){if(e.target===document.getElementById('overlay'))closePopup();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();});

function filter(era){
  document.querySelectorAll('.era-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('btn-'+(era==='all'?'all':era));
  if(btn)btn.classList.add('active');
  let visible=0;
  Object.entries(markers).forEach(([id,m])=>{
    const show=era==='all'||C[id].era===era;
    if(show){m.addTo(map);visible++;}else m.remove();
  });
  document.querySelectorAll('.si').forEach(el=>el.classList.toggle('hidden',era!=='all'&&el.dataset.era!==era));
  document.getElementById('count').textContent=era==='all'?Object.keys(C).length:visible;
}

buildSidebar();
</script>
</body>
</html>
