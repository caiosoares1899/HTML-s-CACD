<script>
// ==============================================================
// DADOS ECONÔMICOS DO BRASIL JOANINO
// ==============================================================
const dadosEconomicos = {
    "AM": { 
        nome: "Capitania do Rio Negro / Amazonas", 
        produtos: ["Drogas do Sertão (cacau, cravo, canela)", "Salsaparrilha", "Guaraná"], 
        grupo: "extrativo", cor: "#76b852", 
        descricao: "As 'drogas do sertão' entraram em declínio devido à concorrência asiática, mas o extrativismo ainda abastecia o mercado interno e a farmacopeia colonial. A Coroa incentivou expedições científicas e a navegação pelo Rio Amazonas para consolidar fronteiras.", 
        extra: "Viajantes naturalistas como Alexandre Rodrigues Ferreira documentaram a riqueza botânica. A abertura dos portos facilitou o escoamento de alguns produtos para a Europa.",
        pext: "A Amazônia despertava cobiça internacional. Portugal temia que potências estrangeiras (Inglaterra, França) estabelecessem bases na região. A presença da Corte no Rio reforçou a necessidade de ocupação efetiva da Amazônia."
    },
    "MA": { 
        nome: "Maranhão", 
        produtos: ["Algodão (Rei Algodão)", "Arroz", "Couro"], 
        grupo: "algodao", cor: "#e0ac69", 
        descricao: "O 'Rei Algodão' reinava absoluto: algodão de fibra longa exportado para a Inglaterra e teares britânicos. Arroz também se destacava como cultura complementar. A Companhia de Comércio do Grão-Pará e Maranhão estimulou a produção.", 
        extra: "Com a Abertura dos Portos (1808), o escoamento direto para a Europa explodiu, modernizando a elite agrária maranhense.",
        pext: "O algodão maranhense abastecia diretamente a Revolução Industrial inglesa. A abertura dos portos beneficiou enormemente a região, que passou a negociar diretamente com Liverpool, gerando atritos com comerciantes portugueses."
    },
    "CE": { 
        nome: "Ceará", 
        produtos: ["Pecuária", "Couro", "Charque"], 
        grupo: "pecuaria", cor: "#c49a6c", 
        descricao: "A economia baseava-se na criação extensiva de gado, fornecendo couro, carne-seca e animais de tração para as minas do Sudeste e para o abastecimento interno. As charqueadas cearenses abasteciam principalmente o mercado nordestino.", 
        extra: "Grandes fazendas de gado no sertão e no litoral; o sal também teve relevância para conservação de alimentos.",
        pext: "O charque cearense competia com o produto platino (Argentina e Uruguai). As relações com o Prata eram tensas, e D. João VI usou tarifas para proteger a produção nacional."
    },
    "RN": { 
        nome: "Rio Grande do Norte", 
        produtos: ["Sal marinho", "Pecuária", "Algodão"], 
        grupo: "algodao", cor: "#d9b48b", 
        descricao: "Salinas naturais produziam sal para conservação de carnes e pescado. O algodão ganhou espaço, e a pecuária caprina/ovina complementava a economia. Importante fornecedor de charque para outras regiões.", 
        extra: "Com a corte no Rio, a demanda por sal e carne seca aumentou consideravelmente.",
        pext: "O sal do RN era essencial para a indústria da pesca e conservação — produto estratégico para o abastecimento da Corte."
    },
    "PB": { 
        nome: "Paraíba", 
        produtos: ["Algodão", "Cana-de-açúcar", "Mandioca"], 
        grupo: "algodao", cor: "#e0ac69", 
        descricao: "Zona da Mata com pequenos engenhos de açúcar e tabaco; o algodão tornou-se cada vez mais expressivo no início do século XIX. Mandioca para farinha de subsistência.", 
        extra: "Região de transição entre canaviais pernambucanos e sertão paraibano.",
        pext: "A Paraíba se beneficiou da alta dos preços do algodão no mercado internacional, intensificando o comércio com a Inglaterra."
    },
    "PE": { 
        nome: "Pernambuco", 
        produtos: ["Cana-de-açúcar (novos engenhos)", "Tabaco", "Algodão"], 
        grupo: "acucar", cor: "#b3863c", 
        descricao: "Após crise do açúcar, novos engenhos (com tecnologia mais eficiente) renovaram a lavoura canavieira. Tabaco de corda e algodão complementavam. Recife tornou-se um dos maiores portos do Império, escoando açúcar e algodão.", 
        extra: "Revolução Pernambucana de 1817 refletiu o descontentamento com os impostos e a influência britânica, mas também a força econômica local.",
        pext: "O porto do Recife era estratégico para os interesses britânicos no Atlântico Sul. A Revolução de 1817 alarmou a Inglaterra, que temia perder influência na região."
    },
    "BA": { 
        nome: "Bahia", 
        produtos: ["Cana-de-açúcar", "Tabaco (fumo de corda)", "Mandioca", "Azeite de dendê"], 
        grupo: "acucar", cor: "#b3863c", 
        descricao: "Principal região produtora de açúcar e tabaco do período colonial tardio. Salvador era um dos maiores centros urbanos e porto atlântico vital. O cultivo de dendê e algodão também se destacava, com forte presença de mão de obra escravizada.", 
        extra: "Casa da moeda e fundição instaladas; relação comercial intensa com a África.",
        pext: "Salvador era o elo comercial com a África (tráfico de escravizados). A pressão inglesa pelo fim do tráfico afetou diretamente a economia baiana, gerando atritos diplomáticos."
    },
    "MG": { 
        nome: "Minas Gerais", 
        produtos: ["Mineração (ouro e diamantes declinantes)", "Agricultura de subsistência", "Pecuária", "Manufaturas"], 
        grupo: "mineracao", cor: "#cfb27c", 
        descricao: "Capitania mais populosa do Brasil Joanino. A mineração ainda produzia, mas em franco declínio. O governo joanino estimulou manufaturas (Fábrica de Ferro Patriótica, tecelagem) e a diversificação agrícola. A pecuária e a produção de gêneros alimentícios supríam as vilas mineradoras.", 
        extra: "Vila Rica (atual Ouro Preto) foi centro cultural e intelectual; várias tentativas de fomento industrial surgiram com a Corte.",
        pext: "Minas era o coração econômico da colônia. A decadência da mineração preocupava Portugal, que via diminuir sua principal fonte de riqueza. D. João VI tentou reverter o quadro com incentivos industriais."
    },
    "SP": { 
        nome: "São Paulo", 
        produtos: ["Açúcar (Piracicaba e oeste)", "Tropeirismo", "Algodão"], 
        grupo: "acucar", cor: "#b3863c", 
        descricao: "Após o colapso da produção no planalto (antigos engenhos como São Domingos), Piracicaba consolidou-se como hub de tropeiros e novos engenhos de açúcar. A região tornou-se elo entre o sul, as minas e o porto de Santos. O comércio de mulas e tropas impulsionou a economia paulista.", 
        extra: "Caminho para o sul e para o mercado platino; foco na logística e abastecimento.",
        pext: "A posição geográfica de SP conectava o Prata ao Sudeste. A importância do tropeirismo na integração econômica regional era crucial para a coesão do território."
    },
    "PR": { 
        nome: "Paraná (parte da Capitania de São Paulo até 1853)", 
        produtos: ["Erva-mate", "Madeira", "Pecuária"], 
        grupo: "mate", cor: "#82b366", 
        descricao: "A erva-mate era o grande motor econômico do interior paranaense, utilizada como moeda de troca e consumida extensivamente no sul do Brasil e nas Províncias do Prata. O mate era escoado pelos portos de Paranaguá e Antonina.", 
        extra: "O tropeirismo de erva-mate conectava o sul à Corte; a planta era chamada de 'ouro verde'.",
        pext: "O comércio de erva-mate com o Prata era intenso, mas sujeito a disputas fronteiriças. A região era zona de influência disputada entre Brasil e Espanha."
    },
    "SC": { 
        nome: "Santa Catarina", 
        produtos: ["Óleo de Baleia", "Pescado", "Farinha de mandioca"], 
        grupo: "baleia", cor: "#5f9ea0", 
        descricao: "Caça à baleia era a principal atividade econômica do litoral catarinense, com armações na Ilha de Santa Catarina. O óleo de baleia era enviado ao Rio de Janeiro para iluminação pública e lubrificação de equipamentos. Pesca e farinha de mandioca complementavam.", 
        extra: "A Real Armação da Baleia era concessionada pela Coroa e garantia receita significativa.",
        pext: "O óleo de baleia era estratégico para a iluminação pública da Corte. O controle luso-brasileiro da caça à baleia no Atlântico Sul era parte da política marítima de D. João VI."
    },
    "RS": { 
        nome: "Rio Grande de São Pedro (Rio Grande do Sul)", 
        produtos: ["Charque", "Couro", "Trigo", "Graxa", "Sebo", "Velas"], 
        grupo: "pecuaria", cor: "#a57047", 
        descricao: "Pecuária extensiva nas campinas gaúchas gerava charque (carne seca) abastecendo as regiões Sudeste, inclusive a Corte. Couro, graxa, sebo e velas eram subprodutos valiosos. O cultivo de trigo começava a ensaiar uma produção incipiente no sul.", 
        extra: "Charqueadas utilizavam mão de obra escravizada. Região de fronteira, com disputas territoriais e intenso trânsito comercial com o Prata.",
        pext: "A região era disputada com a Espanha (e depois com Argentina e Uruguai). A produção de charque gaúcho competia diretamente com o produto platino — questão central da política externa joanina."
    },
    "RJ": { 
        nome: "Rio de Janeiro (Corte e Capitania)", 
        produtos: ["Açúcar (Campos dos Goytacazes)", "Café (início da expansão)", "Manufaturas reais"], 
        grupo: "acucar", cor: "#b37b2e", 
        descricao: "Sede da Família Real e centro político do Império. O açúcar predominava em Campos, enquanto o café começava a expandir-se pelo Vale do Paraíba. D. João VI fomentou manufaturas têxteis, fábrica de pólvora, ferro e a Imprensa Régia. O porto do Rio tornou-se o mais dinâmico da América do Sul.", 
        extra: "Abertura dos Portos (1808) e Tratados de Comércio com a Inglaterra transformaram a economia carioca. Surgiram o Banco do Brasil e a Real Junta do Comércio.",
        pext: "O Rio tornou-se a capital do Império Português (1815). A elevação do Brasil a Reino Unido foi uma jogada diplomática de D. João VI para manter alianças com a Inglaterra e garantir proteção marítima."
    }
};

// Cores por grupo de produto (legenda)
const produtoCores = {
    algodao: "#e0ac69",
    acucar: "#b3863c", 
    pecuaria: "#a57047",
    mineracao: "#cfb27c",
    extrativo: "#76b852",
    mate: "#82b366",
    baleia: "#5f9ea0"
};

// Coordenadas dos estados
const coordsEstados = {
    "AM": [-3.47, -62.0], "MA": [-5.5, -45.5], "CE": [-5.2, -39.5], "RN": [-5.8, -36.6],
    "PB": [-7.0, -36.5], "PE": [-8.3, -37.0], "BA": [-12.5, -41.0], "MG": [-18.5, -44.5],
    "SP": [-22.5, -48.5], "PR": [-24.8, -51.5], "SC": [-27.2, -50.5], "RS": [-30.0, -53.5],
    "RJ": [-22.2, -42.5]
};

// Inicializar mapa
const map = L.map('map', {center: [-14.2, -53.0], zoom: 4, minZoom: 3, maxZoom: 9});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {subdomains: 'abcd'}).addTo(map);

// Carregar GeoJSON do IBGE
let markers = {};
let ufNames = {};

fetch('https://servicodados.ibge.gov.br/api/v3/malhas/paises/BR?formato=application/vnd.geo+json&qualidade=minima&intrarregiao=UF')
    .then(r => r.json())
    .then(geoJson => {
        L.geoJSON(geoJson, {
            style: {fillColor: '#1a2e1e', fillOpacity: .55, color: '#3d6645', weight: .8},
            onEachFeature: (feature, layer) => {
                const uf = feature.properties.sigla;
                if(uf && dadosEconomicos[uf]) {
                    ufNames[uf] = feature.properties.nome;
                    const dados = dadosEconomicos[uf];
                    const icon = L.divIcon({
                        html: `<div style="width:14px;height:14px;border-radius:50%;background:${dados.cor};border:2px solid rgba(255,255,255,.3);box-shadow:0 0 0 2px ${dados.cor}66,0 0 12px ${dados.cor};cursor:pointer;"></div>`,
                        iconSize: [14,14], iconAnchor: [7,7]
                    });
                    const marker = L.marker(coordsEstados[uf], {icon}).addTo(map);
                    marker.on('click', () => openPopup(uf));
                    marker.bindTooltip(`<b>${dados.nome}</b><br><span>🎯 ${dados.produtos[0]}</span>`, {direction: 'top', offset: [0,-8], className: 'cacd-tooltip'});
                    markers[uf] = marker;
                }
            }
        });
    })
    .catch(() => {
        // Fallback: criar marcadores mesmo sem GeoJSON
        Object.entries(dadosEconomicos).forEach(([uf, dados]) => {
            const icon = L.divIcon({
                html: `<div style="width:14px;height:14px;border-radius:50%;background:${dados.cor};border:2px solid #fff3;box-shadow:0 0 0 2px ${dados.cor}66;cursor:pointer;"></div>`,
                iconSize: [14,14], iconAnchor: [7,7]
            });
            const marker = L.marker(coordsEstados[uf], {icon}).addTo(map);
            marker.on('click', () => openPopup(uf));
            marker.bindTooltip(`<b>${dados.nome}</b><br><span>🎯 ${dados.produtos[0]}</span>`, {className: 'cacd-tooltip'});
            markers[uf] = marker;
        });
    });

// Construir sidebar
function buildSidebar() {
    const sl = document.getElementById('slist');
    sl.innerHTML = '';
    const total = Object.keys(dadosEconomicos).length;
    document.getElementById('count').textContent = total;
    Object.entries(dadosEconomicos).forEach(([uf, dados]) => {
        const div = document.createElement('div');
        div.className = 'si';
        div.dataset.grupo = dados.grupo;
        div.onclick = () => openPopup(uf);
        div.innerHTML = `
            <div class="si-dot" style="background: ${dados.cor};"></div>
            <div><div class="si-name">${dados.nome}</div><div class="si-sub">${dados.produtos.slice(0,2).join(' · ')}</div></div>
        `;
        sl.appendChild(div);
    });
}

function openPopup(uf) {
    const d = dadosEconomicos[uf];
    if(!d) return;
    const $ = id => document.getElementById(id);
    $('p-tag').textContent = d.grupo.toUpperCase();
    $('p-tag').style.cssText = `background:${d.cor}22;color:${d.cor};border:1px solid ${d.cor}55`;
    $('p-title').textContent = d.nome;
    $('p-loc').textContent = uf;
    $('p-produtos').innerHTML = d.produtos.map(p => `<li>${p}</li>`).join('');
    $('p-desc').textContent = d.descricao;
    $('p-extra').textContent = d.extra;
    $('p-pext').textContent = d.pext;
    document.getElementById('overlay').classList.add('open');
    if(coordsEstados[uf]) map.panTo(coordsEstados[uf], {animate: true, duration: .5});
}

function closePopup() { document.getElementById('overlay').classList.remove('open'); }
function closeIfBg(e) { if(e.target === document.getElementById('overlay')) closePopup(); }
document.addEventListener('keydown', e => { if(e.key === 'Escape') closePopup(); });

function filter(grupo) {
    document.querySelectorAll('.produto-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`btn-${grupo === 'all' ? 'all' : grupo}`);
    if(btn) btn.classList.add('active');
    
    let visible = 0;
    Object.entries(markers).forEach(([uf, m]) => {
        const dados = dadosEconomicos[uf];
        const show = grupo === 'all' || dados.grupo === grupo;
        if(show) { m.addTo(map); visible++; } else m.remove();
    });
    document.querySelectorAll('.si').forEach(el => {
        el.classList.toggle('hidden', grupo !== 'all' && el.dataset.grupo !== grupo);
    });
    document.getElementById('count').textContent = grupo === 'all' ? Object.keys(dadosEconomicos).length : visible;
}

buildSidebar();
filter('all');
</script>
</body>
</html>
